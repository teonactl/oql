name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edizione da buildare'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - base
          - full

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────
          - os: ubuntu-22.04
            edition: base
            artifact: oql-linux-base
            ext: AppImage

          - os: ubuntu-22.04
            edition: full
            artifact: oql-linux-full
            ext: AppImage

          # ── macOS ──────────────────────────────────────────────
          - os: macos-13
            edition: base
            artifact: oql-macos-base
            ext: dmg

          - os: macos-13
            edition: full
            artifact: oql-macos-full
            ext: dmg

          # ── Windows ────────────────────────────────────────────
          - os: windows-2022
            edition: base
            artifact: oql-windows-base
            ext: zip

          - os: windows-2022
            edition: full
            artifact: oql-windows-full
            ext: zip

    runs-on: ${{ matrix.os }}
    if: github.event_name != 'workflow_dispatch' || inputs.edition == 'both' || inputs.edition == matrix.edition

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Qt 6.5 LTS ────────────────────────────────────────────
      # v3 dell'action; 6.5.3 LTS.
      # qtsvg e qtdeclarative sono nel pacchetto base di Qt 6.5.3.
      # qtmultimedia è l'unico addon separato necessario.
      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          modules: 'qtmultimedia'
          cache: true

      # ── Linux deps ────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            liblilv-dev libsuil-dev libsoundtouch-dev \
            libx11-dev pkg-config \
            libfuse2 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libxkbcommon0 \
            libgl1-mesa-dev libegl1-mesa-dev

      # ── macOS deps ────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install lilv sound-touch pkg-config

      # ── Windows deps (vcpkg) ──────────────────────────────────
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pkgconfiglite -y
          vcpkg install lilv:x64-windows soundtouch:x64-windows

      # ── Configure (Linux) ─────────────────────────────────────
      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOQL_EDITION=${{ matrix.edition }}

      # ── Configure (macOS) ─────────────────────────────────────
      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/share/pkgconfig"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOQL_EDITION=${{ matrix.edition }} \
            -DCMAKE_PREFIX_PATH="${QT_ROOT_DIR}"

      # ── Configure (Windows) ───────────────────────────────────
      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          $env:PKG_CONFIG_PATH = "$vcpkgRoot\installed\x64-windows\lib\pkgconfig"
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DOQL_EDITION=${{ matrix.edition }} `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ── Build ─────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Package — Linux (.AppImage) ───────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt

          install -Dm755 build/oql AppDir/usr/bin/oql
          install -Dm644 resources/oql.svg \
            AppDir/usr/share/icons/hicolor/scalable/apps/oql.svg
          mkdir -p AppDir/usr/share/applications
          sed 's|^Exec=.*|Exec=oql|; s|^Icon=.*|Icon=oql|' \
            resources/oql.desktop \
            > AppDir/usr/share/applications/oql.desktop

          QMAKE=$(which qmake) \
          APPIMAGE_EXTRACT_AND_RUN=1 \
          ./linuxdeploy --appdir AppDir --plugin qt --output appimage

          # linuxdeploy names output oql-x86_64.AppImage
          find . -maxdepth 1 -name '*.AppImage' \
            ! -name 'linuxdeploy' ! -name 'linuxdeploy-plugin-qt' \
            -exec mv {} ${{ matrix.artifact }}.AppImage \;

      # ── Package — macOS (.dmg) ────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find build -name "oql.app" -maxdepth 4 | head -1)
          echo "Found app bundle: $APP"
          "${QT_ROOT_DIR}/bin/macdeployqt" "$APP" -dmg
          DMG=$(find build -name "oql.dmg" -maxdepth 4 | head -1)
          echo "Found dmg: $DMG"
          mv "$DMG" ${{ matrix.artifact }}.dmg

      # ── Package — Windows (.zip) ──────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item build\Release\oql.exe dist\
          windeployqt --release --compiler-runtime dist\oql.exe
          Copy-Item "$env:QT_ROOT_DIR\bin\Qt6*.dll" dist\ -Force
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          foreach ($dll in @("lilv-0.dll","sord-0.dll","serd-0.dll","soundtouch.dll")) {
            $src = "$vcpkgBin\$dll"
            if (-not (Test-Path $src)) { throw "DLL richiesta non trovata: $src" }
            Copy-Item $src dist\
          }
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.artifact }}.zip

      # ── Upload artifact ───────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

      # ── Create / update GitHub Release ───────────────────────
      - name: Publish to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.${{ matrix.ext }}
          generate_release_notes: true
