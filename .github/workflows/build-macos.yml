name: Build macOS

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel  # Intel x86_64
            arch: x86_64
          - runner: macos-15        # Apple Silicon ARM64 — macos-latest è ora macOS 26 (Tahoe)
            arch: arm64             # e firma con CodeDirectory v=20400 incompatibile con macOS 15.x

    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.9.3'
          modules: 'qtmultimedia'
          cache: true

      - name: Install dependencies
        run: brew install lilv sound-touch pkg-config

      - name: Generate icon
        run: |
          brew install librsvg
          mkdir resources/oql.iconset
          for size in 16 32 128 256 512; do
            rsvg-convert -w $size -h $size resources/oql.svg \
              -o resources/oql.iconset/icon_${size}x${size}.png
            rsvg-convert -w $((size*2)) -h $((size*2)) resources/oql.svg \
              -o resources/oql.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns resources/oql.iconset -o resources/oql.icns

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/share/pkgconfig"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}"

      - name: Build
        run: cmake --build build --parallel

      # Niente "|| true": Qt di Homebrew (qt6 formula) non risolveva i rpath
      # di QtPdf/QtVirtualKeyboard/libbrotli/libwebp/libsharpyuv e falliva la
      # verifica della firma codesign — errori mascherati finora. Con la
      # distribuzione Qt ufficiale (auto-contenuta) non si presentano.
      - name: Deploy Qt
        run: |
          "${Qt6_DIR}/bin/macdeployqt" build/oql.app

      # Ordine di firma bottom-up con --force:
      # 1. dylib standalone in Frameworks
      # 2. dylib in PlugIns
      # 3. Per ogni .framework: prima firma il binario Mach-O interno (che ha
      #    una firma embedded propria modificata da macdeployqt), poi il bundle
      # 4. app bundle
      - name: Sign (ad-hoc)
        run: |
          find build/oql.app/Contents/Frameworks -maxdepth 1 -name "*.dylib" \
            -exec codesign --sign - --force {} \;
          find build/oql.app/Contents/PlugIns -name "*.dylib" \
            -exec codesign --sign - --force {} \;
          find build/oql.app/Contents/Frameworks -maxdepth 1 -name "*.framework" | while read fw; do
            bin=$(basename "$fw" .framework)
            find "$fw" -type f -name "$bin" -exec codesign --sign - --force {} \;
            codesign --sign - --force "$fw"
          done
          codesign --sign - --force build/oql.app

      - name: Verify bundle
        run: |
          echo "=== Resources (icona) ==="
          ls -la build/oql.app/Contents/Resources/
          echo "=== CFBundleIconFile ==="
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconFile" \
            build/oql.app/Contents/Info.plist 2>/dev/null || echo "(non trovato)"
          echo "=== Verifica firma ==="
          codesign --verify --deep --strict --verbose=4 build/oql.app 2>&1 || true
          echo "=== Firma app ==="
          codesign -dvvv build/oql.app 2>&1 | grep -E "Identifier|TeamID|Signature|flags|CDHash" || true

      # macdeployqt -dmg genera un alias HFS interno che Finder non riesce ad
      # aprire su Intel (errore "(null)"). hdiutil crea un DMG semplice e
      # affidabile senza alias.
      - name: Create DMG
        run: |
          hdiutil create -volname "OQL" \
            -srcfolder build/oql.app \
            -ov -format UDZO \
            build/OQL-macOS-${{ matrix.arch }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OQL-macOS-${{ matrix.arch }}
          path: build/OQL-macOS-${{ matrix.arch }}.dmg
          retention-days: 30

      - name: Publish dev-latest
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Dev build (latest main)"
          prerelease: true
          make_latest: false
          body: "Ultima build automatica dal branch `main`. Aggiornata ad ogni commit."
          files: build/OQL-macOS-${{ matrix.arch }}.dmg
