name: Build macOS

on:
  push:
    branches: [main, feature/**]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel  # Intel x86_64 (macos-13 ritirato da GitHub a dic 2025)
            arch: x86_64
          - runner: macos-latest    # Apple Silicon ARM64
            arch: arm64

    runs-on: ${{ matrix.runner }}
    name: macOS ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.9.3'
          modules: 'qtmultimedia'
          cache: true

      - name: Install dependencies
        run: brew install lilv sound-touch pkg-config

      - name: Configure
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/share/pkgconfig"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}"

      - name: Build
        run: cmake --build build --parallel

      # Niente "|| true": Qt di Homebrew (qt6 formula) non risolveva i rpath
      # di QtPdf/QtVirtualKeyboard/libbrotli/libwebp/libsharpyuv e falliva la
      # verifica della firma codesign — errori mascherati finora. Con la
      # distribuzione Qt ufficiale (auto-contenuta) non si presentano.
      - name: Deploy Qt
        run: |
          "${Qt6_DIR}/bin/macdeployqt" build/oql.app

      # Ad-hoc signing dall'interno verso l'esterno: --deep è deprecato e non
      # gestisce l'ordine corretto per bundle Qt. macdeployqt modifica i binari
      # con install_name_tool invalidando la firma originale Apple; usare
      # --preserve-metadata preserverebbe quella firma rotta. Si firma invece
      # bottom-up: dylib → binari framework → bundle framework → app.
      - name: Sign (ad-hoc)
        run: |
          find build/oql.app -name "*.dylib" \
            -exec codesign --sign - --force {} \;
          find build/oql.app/Contents/Frameworks -type f ! -name "*.*" \
            -exec codesign --sign - --force {} \;
          find build/oql.app/Contents/Frameworks -maxdepth 1 -name "*.framework" \
            -exec codesign --sign - --force {} \;
          codesign --sign - --force build/oql.app

      # macdeployqt -dmg genera un alias HFS interno che Finder non riesce ad
      # aprire su Intel (errore "(null)"). hdiutil crea un DMG semplice e
      # affidabile senza alias.
      - name: Create DMG
        run: |
          hdiutil create -volname "OQL" \
            -srcfolder build/oql.app \
            -ov -format UDZO \
            build/OQL-macOS-${{ matrix.arch }}.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OQL-macOS-${{ matrix.arch }}
          path: build/OQL-macOS-${{ matrix.arch }}.dmg
          retention-days: 30
