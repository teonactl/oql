name: Build Beta (Full + scadenza)

on:
  workflow_dispatch:
    inputs:
      expiry:
        description: 'Data scadenza beta (YYYY-MM-DD)'
        required: false
        default: '2027-06-21'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: oql-beta-linux
            ext: AppImage

          - os: macos-15-intel  # macos-13 ritirato da GitHub a dic 2025
            artifact: oql-beta-macos-x64
            ext: dmg

          - os: macos-15        # arm64 — macos-latest è ora macOS 26 (Tahoe)
            artifact: oql-beta-macos-arm64
            ext: dmg

          - os: windows-2022
            artifact: oql-beta-windows
            ext: exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.9.3'
          arch: ${{ runner.os == 'Windows' && 'win64_msvc2022_64' || '' }}
          modules: 'qtmultimedia'
          cache: true

      # ── Linux ────────────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            liblilv-dev libsuil-dev libsoundtouch-dev \
            libx11-dev pkg-config \
            libfuse2 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libxkbcommon0 \
            libgl1-mesa-dev libegl1-mesa-dev

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOQL_EDITION=full \
            -DOQL_BETA_EXPIRY="${{ inputs.expiry || '2027-06-21' }}"

      # ── macOS ────────────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install lilv sound-touch pkg-config librsvg

      - name: Generate icon (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir resources/oql.iconset
          for size in 16 32 128 256 512; do
            rsvg-convert -w $size -h $size resources/oql.svg \
              -o resources/oql.iconset/icon_${size}x${size}.png
            rsvg-convert -w $((size*2)) -h $((size*2)) resources/oql.svg \
              -o resources/oql.iconset/icon_${size}x${size}@2x.png
          done
          iconutil -c icns resources/oql.iconset -o resources/oql.icns

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/lib/pkgconfig:$(brew --prefix)/share/pkgconfig"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOQL_EDITION=full \
            -DOQL_BETA_EXPIRY="${{ inputs.expiry || '2027-06-21' }}" \
            -DCMAKE_PREFIX_PATH="${Qt6_DIR}"

      # ── Windows ──────────────────────────────────────────────────
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pkgconfiglite -y
          vcpkg install lilv:x64-windows soundtouch:x64-windows

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          $env:PKG_CONFIG_PATH = "$vcpkgRoot\installed\x64-windows\lib\pkgconfig"
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DOQL_EDITION=full `
            "-DOQL_BETA_EXPIRY=${{ inputs.expiry || '2027-06-21' }}" `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # ── Build ─────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Package Linux ─────────────────────────────────────────────
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          wget -q -O linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q -O linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt

          install -Dm755 build/oql AppDir/usr/bin/oql
          install -Dm644 resources/oql.svg \
            AppDir/usr/share/icons/hicolor/scalable/apps/oql.svg
          mkdir -p AppDir/usr/share/applications
          sed 's|^Exec=.*|Exec=oql|; s|^Icon=.*|Icon=oql|' \
            resources/oql.desktop \
            > AppDir/usr/share/applications/oql.desktop

          QMAKE=$(which qmake) \
          APPIMAGE_EXTRACT_AND_RUN=1 \
          ./linuxdeploy --appdir AppDir --plugin qt --output appimage

          find . -maxdepth 1 -name '*.AppImage' \
            ! -name 'linuxdeploy' ! -name 'linuxdeploy-plugin-qt' \
            -exec mv {} ${{ matrix.artifact }}.AppImage \;

      # ── Package macOS ─────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          APP=$(find build -name "oql.app" -maxdepth 4 | head -1)
          echo "Found app bundle: $APP"
          "${Qt6_DIR}/bin/macdeployqt" "$APP"
          find "$APP/Contents/Frameworks" -maxdepth 1 -name "*.dylib" \
            -exec codesign --sign - --force {} \;
          find "$APP/Contents/PlugIns" -name "*.dylib" \
            -exec codesign --sign - --force {} \;
          find "$APP/Contents/Frameworks" -maxdepth 1 -name "*.framework" | while read fw; do
            bin=$(basename "$fw" .framework)
            find "$fw" -type f -name "$bin" -exec codesign --sign - --force {} \;
            codesign --sign - --force "$fw"
          done
          codesign --sign - --force "$APP"
          STAGING=$(mktemp -d)
          ditto "$APP" "$STAGING/OQL.app"
          hdiutil create -volname "OQL" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            ${{ matrix.artifact }}.dmg
          rm -rf "$STAGING"

      # ── Package Windows ───────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item build\Release\oql.exe dist\
          windeployqt --release --compiler-runtime dist\oql.exe
          Copy-Item "$env:Qt6_DIR\bin\Qt6*.dll" dist\ -Force
          $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
          foreach ($dll in @("lilv-0.dll","sord-0.dll","serd-0.dll","sratom-0.dll","zix-0.dll","soundtouch.dll")) {
            $src = "$vcpkgBin\$dll"
            if (-not (Test-Path $src)) { throw "DLL richiesta non trovata: $src" }
            Copy-Item $src dist\
          }
          # Il runtime MSVC (msvcp140/vcruntime140) lo installa il redistributable
          # ufficiale firmato Microsoft via [Run] in installer.iss, non copiando
          # le DLL a mano: alcuni antivirus le quarantinano se depositate da un
          # installer non firmato (pattern simile al DLL side-loading).
          # msvcp140_1.dll a parte: il vc_redist non garantisce sempre questo
          # file sulla macchina di destinazione (versioni preesistenti del
          # redistributable), quindi lo affianchiamo direttamente all'exe.
          $sys32Msvcp140_1 = "C:\Windows\System32\msvcp140_1.dll"
          if (Test-Path $sys32Msvcp140_1) { Copy-Item $sys32Msvcp140_1 dist\ -Force }
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vc_redist.x64.exe"
          $version = git describe --tags --always 2>$null
          if (-not $version) { $version = "0.1.0" }
          & 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe' `
            /DMyAppVersion="$version" `
            /DOutputFile="${{ matrix.artifact }}" `
            installer.iss

      # ── Upload artifact (30-day backup) ──────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}
          retention-days: 30

      # ── Publish to beta-latest release (URL stabile) ─────────────
      - name: Publish to beta-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta-latest
          name: "Beta — versione di test (scade ${{ inputs.expiry || '2027-06-21' }})"
          prerelease: true
          body: |
            **Versione BETA per test interno.**

            - Scade il ${{ inputs.expiry || '2027-06-21' }}
            - Edizione: Full (include tutti i cue type)
            - Non distribuire a terzi

            Build automatica via GitHub Actions.
          files: ${{ matrix.artifact }}.${{ matrix.ext }}
